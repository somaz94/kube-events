apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-probe-app
  namespace: kube-events-demo
  labels:
    app: bad-probe-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-probe-app
  template:
    metadata:
      labels:
        app: bad-probe-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /nonexistent
              port: 9999
            initialDelaySeconds: 1
            periodSeconds: 3
            failureThreshold: 3
