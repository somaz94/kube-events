version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/main.go
    binary: kube-events
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/somaz94/kube-events/cmd/cli.version={{.Version}}
      - -X github.com/somaz94/kube-events/cmd/cli.commit={{.Commit}}
      - -X github.com/somaz94/kube-events/cmd/cli.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: somaz94
    name: kube-events
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: somaz94
      name: homebrew-tap
    homepage: "https://github.com/somaz94/kube-events"
    description: "View and summarize Kubernetes events with grouping and highlighting"
    license: "Apache-2.0"
    install: |
      bin.install "kube-events"
    test: |
      system "#{bin}/kube-events", "version"
    caveats: |
      🎉 kube-events installed!

      Quick start:
        kube-events                        # View recent events (last 1h)
        kube-events -n <namespace>         # Filter by namespace
        kube-events -t Warning             # Show warnings only
        kube-events -g namespace           # Group by namespace
        kube-events -w                     # Watch events in real-time
        kube-events -s                     # Summary statistics only
        kube-events --help                 # Full usage

      Docs: https://github.com/somaz94/kube-events

krews:
  - name: events2
    repository:
      owner: somaz94
      name: krew-index
    homepage: "https://github.com/somaz94/kube-events"
    description: "View and summarize Kubernetes events with grouping and highlighting"
    short_description: "View and summarize K8s events"
